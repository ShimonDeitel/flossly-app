name: Flossly
options:
  bundleIdPrefix: com.shimondeitel.flossly
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Flossly:
    type: application
    platform: iOS
    sources:
      - path: Flossly
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.flossly
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Flossly/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  FlosslyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: FlosslyTests
      - path: Flossly.storekit
    dependencies:
      - target: Flossly
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.flossly.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  FlosslyUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: FlosslyUITests
    dependencies:
      - target: Flossly
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.flossly.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Flossly:
    build:
      targets:
        Flossly: all
        FlosslyTests: [test]
        FlosslyUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Flossly.storekit
    test:
      config: Debug
      storeKitConfiguration: Flossly.storekit
      targets:
        - FlosslyTests
        - FlosslyUITests
    archive:
      config: Release
